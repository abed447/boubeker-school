<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>موقع مدرسة بوبكر محمد القرآنية</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Cairo:wght@400;600;700;900&display=swap');
        
        :root {
            --bg-color: #f5ede2;
            --primary-dark: #132e15;
            --primary-light: #1c4520;
            --gold: #c5a059;
            --gold-bright: #d4af37;
            --text-dark: #2c251e;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-dark);
            margin: 0;
            padding: 0;
            background-image: radial-gradient(rgba(197, 160, 89, 0.04) 2px, transparent 2px);
            background-size: 30px 30px;
            -webkit-tap-highlight-color: transparent;
        }

        header {
            background: linear-gradient(135deg, #0b1d0d, var(--primary-dark));
            color: white;
            text-align: center;
            padding: 20px 15px;
            border-bottom: 4px solid var(--gold);
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
        }

        header h1 {
            font-family: 'Amiri', serif;
            font-size: 1.8rem;
            margin: 0;
            font-weight: 700;
            color: var(--gold-bright);
            text-shadow: 1px 1px 3px rgba(0,0,0,0.4);
        }

        @media (min-width: 768px) {
            header h1 { font-size: 2.3rem; }
        }

        header p {
            font-family: 'Amiri', serif;
            font-size: 1rem;
            font-style: italic;
            color: #e2d1b5;
            margin: 5px 0 0 0;
        }

        .container {
            max-width: 1100px;
            margin: 10px auto;
            padding: 0 12px;
            box-sizing: border-box;
        }

        .top-info-bar {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 12px;
        }

        @media (min-width: 768px) {
            .top-info-bar {
                display: grid;
                grid-template-columns: 2fr 1fr;
            }
        }

        .about-section {
            background: white;
            border-radius: 10px;
            padding: 15px;
            box-shadow: 0 4px 10px rgba(44, 37, 30, 0.04);
            border: 1px solid #eadecc;
            border-right: 5px solid var(--gold);
        }

        .about-section h2 {
            font-family: 'Amiri', serif;
            color: var(--primary-dark);
            margin: 0 0 8px 0;
            font-size: 1.3rem;
        }

        .about-section p {
            font-size: 0.95rem;
            line-height: 1.6;
            color: #4a4035;
            margin: 0;
            font-weight: 600;
        }

        .contact-section {
            background: white;
            border-radius: 10px;
            padding: 12px;
            box-shadow: 0 4px 10px rgba(44, 37, 30, 0.04);
            border: 1px solid #eadecc;
            border-top: 4px solid var(--gold);
            display: flex;
            flex-direction: column;
            gap: 8px;
            justify-content: center;
        }

        .contact-link {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            text-decoration: none;
            color: var(--text-dark);
            font-weight: bold;
            padding: 10px;
            border-radius: 6px;
            background: #faf6f0;
            transition: all 0.2s ease;
            font-size: 0.9rem;
        }

        .contact-link:hover, .contact-link:active {
            background: #f0e6d6;
        }

        .contact-link.fb { color: #1877f2; }
        .contact-link.web { color: var(--primary-dark); }
        .contact-link.phone { color: #25d366; }

        .stats-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-bottom: 12px;
        }

        @media (max-width: 480px) {
            .stats-container {
                grid-template-columns: 1fr;
            }
        }

        .stat-card {
            background: #ffffff;
            padding: 12px 8px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(44, 37, 30, 0.04);
            border: 1px solid #eadecc;
        }

        .stat-card h3 {
            margin: 0 0 4px 0;
            color: #706253;
            font-size: 0.85rem;
            font-weight: 700;
        }

        .stat-card .number {
            font-size: 1.3rem;
            font-weight: 900;
            color: var(--primary-dark);
            font-family: 'Amiri', serif;
        }

        .hadith-zone {
            text-align: center;
            font-family: 'Amiri', serif;
            font-size: 1.25rem;
            color: var(--primary-dark);
            margin: 12px 0;
            padding: 10px 5px;
            background: #fdfaf4;
            border: 1px dashed var(--gold);
            border-radius: 6px;
            line-height: 1.4;
        }

        .grid-rings {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .ring-card {
            background: white;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.03);
            border: 1px solid #eadecc;
            overflow: hidden;
        }

        .ring-header {
            background: linear-gradient(45deg, var(--primary-dark), var(--primary-light));
            color: white;
            padding: 12px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
        }

        .ring-header h2 {
            margin: 0;
            font-family: 'Amiri', serif;
            font-size: 1.25rem;
            color: var(--gold-bright);
        }

        .ring-meta-info {
            display: flex;
            gap: 6px;
            margin-top: 3px;
            flex-wrap: wrap;
        }

        .badge-info {
            background: rgba(197, 160, 89, 0.25);
            color: #fff;
            padding: 1px 6px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: bold;
            border: 1px solid var(--gold);
        }

        .time-container {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            margin-top: 5px;
        }

        .time-badge {
            background: rgba(255, 255, 255, 0.12);
            color: #fff;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.75rem;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        .header-left-side {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }

        .count-badge {
            background: rgba(255,255,255,0.15);
            padding: 3px 8px;
            border-radius: 12px;
            font-size: 0.8rem;
            border: 1px solid var(--gold);
            font-weight: bold;
            white-space: nowrap;
        }

        .arrow-icon {
            font-size: 0.9rem;
            color: var(--gold-bright);
            transition: transform 0.2s ease;
        }

        .student-list-container {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out;
            background-color: #fff;
        }

        .student-list-container.open {
            max-height: 3500px; 
            border-top: 1px solid #eadecc;
        }

        .ring-actions {
            background: #faf6f0;
            padding: 8px 15px;
            display: none;
            gap: 8px;
            border-bottom: 1px solid #eadecc;
            flex-wrap: wrap;
            align-items: center;
        }

        .student-list {
            list-style: none;
            padding: 5px 15px;
            margin: 0;
        }

        .student-item {
            padding: 10px 5px;
            border-bottom: 1px solid #f4ece1;
            font-size: 1rem;
            font-weight: 700;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }

        .student-info {
            display: flex;
            flex-direction: column;
        }

        .student-name {
            color: var(--text-dark);
        }

        .student-quran {
            font-size: 0.85rem;
            color: #8c765c;
            font-weight: 600;
            margin-top: 2px;
        }

        .student-ctrls {
            display: flex;
            gap: 5px;
        }

        .btn-sm {
            padding: 5px 10px;
            font-size: 0.8rem;
            border-radius: 4px;
            border: none;
            cursor: pointer;
            font-family: 'Cairo', sans-serif;
            font-weight: bold;
        }
        .btn-danger { background-color: #d9534f; color: white; }
        .btn-warning { background-color: #f0ad4e; color: white; }
        .btn-info { background-color: #0275d8; color: white; }

        .admin-panel {
            background: #eae0d2;
            border: 2px double var(--gold);
            padding: 12px;
            border-radius: 12px;
            margin-top: 25px;
            text-align: center;
            display: none;
        }

        .admin-ctrls {
            display: flex;
            margin-top: 12px;
            gap: 12px;
            flex-direction: column;
            background: white;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--gold);
            text-align: right;
        }

        .form-group {
            display: flex;
            gap: 8px;
            flex-direction: column;
            align-items: flex-start;
            border-bottom: 1px dashed #eadecc;
            padding-bottom: 12px;
            width: 100%;
        }

        @media (min-width: 600px) {
            .form-group {
                flex-direction: row;
                align-items: center;
                flex-wrap: wrap;
            }
        }

        input, select, button, textarea {
            padding: 10px 12px;
            font-family: 'Cairo', sans-serif;
            font-size: 0.95rem;
            border-radius: 6px;
            border: 1px solid #cbc0b0;
            width: 100%;
            box-sizing: border-box;
        }

        @media (min-width: 600px) {
            input, select, button, textarea {
                width: auto;
            }
        }

        textarea {
            resize: vertical;
            width: 100%;
        }

        button { font-weight: 700; cursor: pointer; }
        button.btn-main { background-color: var(--primary-dark); color: white; border: 1px solid var(--gold); width: 100%; }
        @media (min-width: 600px) { button.btn-main { width: auto; } }
        button.btn-main:hover { background-color: var(--primary-light); }
        button.btn-admin { background-color: #705828; color: white; border: 1px solid var(--gold-bright); width: 100%; }
    </style>
</head>
<body>

    <header id="main-header">
        <h1>المدرسة القرآنية بوبكر محمد</h1>
        <p>رحمه الله وأسكنه فسيح جناته</p>
    </header>

    <div class="container">
        
        <div class="top-info-bar">
            <div class="about-section">
                <h2 id="about-title"></h2>
                <p id="about-text"></p>
            </div>
            
            <div class="contact-section">
                <a href="#" id="link-website" target="_blank" class="contact-link web">🌐 موقع المدرسة</a>
                <a href="#" id="link-facebook" target="_blank" class="contact-link fb">🔵 صفحة الفيسبوك</a>
                <a href="#" id="link-phone" class="contact-link phone">📞 هاتف التواصل</a>
            </div>
        </div>

        <div class="stats-container">
            <div class="stat-card">
                <h3>المؤسسة</h3>
                <div class="number" style="font-size: 1rem; color:var(--gold)">مدرسة بوبكر محمد</div>
            </div>
            <div class="stat-card">
                <h3>الحلقات والأفواج</h3>
                <div class="number" id="teachers-count">0</div>
            </div>
            <div class="stat-card">
                <h3>إجمالي الطلبة</h3>
                <div class="number" id="students-count">0</div>
            </div>
        </div>

        <div class="hadith-zone">
            "خَيْرُكُمْ مَنْ تَعَلَّمَ الْقُرْآنَ وَعَلَّمَهُ"
        </div>

        <div class="grid-rings" id="rings-container"></div>

        <div class="admin-panel" id="main-admin-panel">
            <button class="btn-admin" style="width: 100%; margin-bottom: 10px; background-color: #d9534f;" onclick="exitAdminMode()">🔒 الخروج الفوري وقفل لوحة التحكم</button>
            
            <div class="admin-ctrls">
                <div class="form-group" style="background-color: #fcfaf7; padding: 12px; border-radius: 6px; box-sizing: border-box;">
                    <label style="font-weight: bold; color: var(--primary-dark); margin-bottom: 5px;">📝 إعدادات الواجهة والاتصال:</label>
                    <div style="width: 100%; display: flex; flex-direction: column; gap: 8px;">
                        <input type="text" id="input-about-title" placeholder="عنوان البطاقة...">
                        <textarea id="input-about-text" rows="2" placeholder="نص التعريف بالمدرسة..."></textarea>
                        <input type="text" id="input-url-web" placeholder="رابط موقع المدرسة الحقيقي...">
                        <input type="text" id="input-url-fb" placeholder="رابط صفحة الفيسبوك...">
                        <input type="text" id="input-url-phone" placeholder="رقم الهاتف...">
                        <button class="btn-main" style="background-color: #2e6930;" onclick="updateAboutSection()">💾 حفظ بيانات الواجهة</button>
                    </div>
                </div>

                <div class="form-group">
                    <label style="font-weight: bold;">🗂️ فوج جديد لأستاذ:</label>
                    <input type="text" id="new-teacher" placeholder="اسم الأستاذ...">
                    <input type="text" id="new-group" placeholder="اسم الفوج (مثل: الفوج أ، الإتقان)...">
                    <input type="text" id="new-age" placeholder="الفئة العمرية (مثل: أطفال، كبار)...">
                    <input type="text" id="new-time" placeholder="التواقيت (افصل بفاصلة)...">
                    <button class="btn-main" onclick="addTeacher()">➕ فتح الفوج</button>
                </div>

                <div class="form-group">
                    <label style="font-weight: bold;">👤 تسجيل تلميذ جديد:</label>
                    <input type="text" id="new-student" placeholder="اسم التلميذ الكامل...">
                    <input type="text" id="new-student-quran" placeholder="مقدار الحفظ (مثال: 5 أحزاب)...">
                    <select id="select-teacher" style="width: 100%;"></select>
                    <button class="btn-main" style="background-color: var(--primary-light);" onclick="addStudent()">➕ تسجيل</button>
                </div>

                <div class="form-group" style="background: #fbf9f6; padding: 8px; border-radius: 6px;">
                    <label style="font-weight: bold;">🔑 كود التعديل الجديد:</label>
                    <input type="password" id="new-password-input" placeholder="اكتب الكود الجديد...">
                    <button class="btn-admin" style="background-color: #5c4214; margin-top: 5px;" onclick="changeAdminPassword()">💾 تحديث الكود</button>
                </div>

                <div class="form-group" style="justify-content: center; border: none; padding: 0; align-items: center; width: 100%;">
                    <button class="btn-sm btn-danger" style="padding: 10px; width: 100%;" onclick="resetToDefaultData()">🔄 إعادة ضبط القائمة الافتراضية النقية</button>
                </div>
            </div>
        </div>

    </div>

    <script>
        // البيانات الافتراضية الأساسية للموقع
        const defaultData = {
            "الأستاذ زرق الراس - الفوج الأول": {
                teacherName: "الأستاذ زرق الراس",
                groupName: "الفوج الأول",
                ageGroup: "شباب",
                visibility: "show",
                times: ["الأحد: 09:30 إلى 13:00", "الثلاثاء: 09:30 إلى 13:00", "الأربعاء: 09:30 إلى 13:00", "الخميس: 11:00 إلى 15:00"],
                students: [
                    { name: "ناصري بن شهرة", quran: "5 أحزاب" }, { name: "بوروينة اسلام", quran: "حزبين" },
                    { name: "ايت عمران الياس", quran: "10 أحزاب" }, { name: "محمد بوبكر", quran: "غير محدد" },
                    { name: "أحمد شعيب", quran: "غير محدد" }, { name: "ابراهيم عكرمي", quran: "غير محدد" },
                    { name: "مريم بطاهر", quran: "غير محدد" }, { name: "لجين برابح", quran: "غير محدد" },
                    { name: "ايت عمران محمد", quran: "غير محدد" }, { name: "بن طرشة ياسين", quran: "غير محدد" },
                    { name: "محيوتي آدم", quran: "غير محدد" }, { name: "بطاهر نور الهدى", quran: "غير محدد" },
                    { name: "يوسف بلقاسم", quran: "غير محدد" }, { name: "رنيم بوروينة", quran: "غير محدد" },
                    { name: "قيروان يوسف", quran: "غير محدد" }, { name: "شعيب أحمد", quran: "غير محدد" },
                    { name: "اية بوروينة", quran: "غير محدد" }, { name: "ملاك مصطفى", quran: "غير محدد" },
                    { name: "اسراء مصطفى", quran: "غير محدد" }, { name: "شعيب عماد ع", quran: "غير محدد" },
                    { name: "خضراوي عبد الله", quran: "غير محدد" }, { name: "عبد الرحمان بلقسام", quran: "غير محدد" },
                    { name: "ياسين بلقاسم", quran: "غير محدد" }, { name: "ادم مواسمي", quran: "غير محدد" },
                    { name: "إسلام مصطفى", quran: "غير محدد" }, { name: "بن عيشوش عبد اللطيف", quran: "غير محدد" },
                    { name: "يوسف ريان مصطفى", quran: "غير محدد" }, { name: "حميدة هارون", quran: "غير محدد" },
                    { name: "عبد الصمد زرق الراس", quran: "غير محدد" }
                ]
            },
            "الأستاذ سليماني - فوج أ": { teacherName: "الأستاذ سليماني", groupName: "فوج أ", ageGroup: "كبار", visibility: "show", times: ["الثلاثاء: 18:00 إلى 20:00", "الجمعة: 18:00 إلى 20:00"], students: [] },
            "الأستاذة كاتب - الإناث": { teacherName: "الأستاذة كاتب", groupName: "الإناث", ageGroup: "مختلف الأعمار", visibility: "show", times: ["السبت إلى الثلاثاء: 13:15", "الخميس: صباحاً ومساءً"], students: [] },
            "الأستاذة ميشاني - فوج البراعم": { teacherName: "الأستاذة ميشاني", groupName: "فوج البراعم", ageGroup: "أطفال (5-8 سنوات)", visibility: "show", times: ["الاثنين: 08:00", "الأربعاء: 15:00"], students: [] },
            "الأستاذة عطا الله - فوج التجويد": { teacherName: "الأستاذة عطا الله", groupName: "فوج التجويد", ageGroup: "نساء", visibility: "show", times: ["السبت والجمعة: 09:00"], students: [] }
        };

        const defaultAbout = {
            title: "🕌 بطاقة تعريفية",
            text: "تُعنى المدرسة القرآنية بوبكر محمد بتحفيظ كتاب الله جل وعلا وترسيخ قيم القرآن الكريم وأحكام التجويد لدى الناشئة والشباب. تسعى المدرسة من خلال حلقاتها المتميزة إلى تنشئة جيل واعٍ، متمسك بكتاب ربه، متقن لأصول تلاوته، عبر برامج تعليمية مدروسة ومواقيت مرنة تناسب الجميع.",
            webUrl: "",
            fbUrl: "",
            phoneNum: ""
        };

        // متغيرات النظام العامة
        let schoolData = defaultData;
        let aboutData = defaultAbout;
        let adminPassword = "1234";
        let isAdmin = false;

        // 1. تهيئة وإعداد Firebase بالمعلومات الحقيقية الخاصة بمشروعك
        const firebaseConfig = {
            apiKey: "AIzaSyCpwcz_yHw9PrsCpVQGrhEv0Lbz6jcUHKE",
            authDomain: "boubkerquranschool.firebaseapp.com",
            databaseURL: "https://boubkerquranschool-default-rtdb.firebaseio.com",
            projectId: "boubkerquranschool",
            storageBucket: "boubkerquranschool.firebasestorage.app",
            messagingSenderId: "1049187708650",
            appId: "1:1049187708650:web:cc6dc105dab86a80063193",
            measurementId: "G-WYYNTFCD2B"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // 2. ربط جلب البيانات السحابية الحية (Realtime Stream) بدلاً من الـ LocalStorage
        db.ref('schoolData').on('value', (snapshot) => {
            if (snapshot.exists()) {
                schoolData = snapshot.val();
            } else {
                schoolData = defaultData;
                db.ref('schoolData').set(defaultData);
            }
            renderSchool();
        });

        db.ref('aboutData').on('value', (snapshot) => {
            if (snapshot.exists()) {
                aboutData = snapshot.val();
            } else {
                aboutData = defaultAbout;
                db.ref('aboutData').set(defaultAbout);
            }
            renderSchool();
        });

        db.ref('adminPassword').on('value', (snapshot) => {
            if (snapshot.exists()) {
                adminPassword = snapshot.val();
            } else {
                adminPassword = "1234";
                db.ref('adminPassword').set("1234");
            }
            renderSchool();
        });

        // 3. الدوال المساعدة لمعالجة الحفظ وترتيب العناصر
        function getQuranNumber(quranText) {
            if (!quranText || quranText === "غير محدد") return -1;
            let match = quranText.match(/\d+/);
            if (match) return parseInt(match[0]);
            if (quranText.includes("حزبين")) return 2;
            if (quranText.includes("حزب")) return 1;
            if (quranText.includes("كامل") || quranText.includes("القرآن")) return 60;
            return 0;
        }

        function sortStudentsByQuran() {
            for (let id in schoolData) {
                if (schoolData[id].students && schoolData[id].students.length > 0) {
                    schoolData[id].students.sort((a, b) => {
                        let numA = getQuranNumber(a.quran);
                        let numB = getQuranNumber(b.quran);
                        if (numB !== numA) return numB - numA;
                        return a.name.localeCompare(b.name, 'ar');
                    });
                }
            }
        }

        function upgradeDataStructure() {
            let updated = false;
            for (let key in schoolData) {
                if (!schoolData[key].teacherName) {
                    schoolData[key].teacherName = key;
                    schoolData[key].groupName = "الفوج العام";
                    schoolData[key].ageGroup = "غير محدد";
                    updated = true;
                }
                if (schoolData[key].students && schoolData[key].students.length > 0) {
                    if (typeof schoolData[key].students[0] === 'string') {
                        schoolData[key].students = schoolData[key].students.map(name => {
                            return { name: name, quran: "غير محدد" };
                        });
                        updated = true;
                    }
                }
            }
            if (updated) {
                db.ref('schoolData').set(schoolData);
            }
        }

        // 4. دالة بناء وعرض واجهة المستخدم الرسومية
        function renderSchool() {
            sortStudentsByQuran();

            document.getElementById('about-title').innerText = aboutData.title || "";
            document.getElementById('about-text').innerText = aboutData.text || "";
            document.getElementById('link-website').href = aboutData.webUrl || "#";
            document.getElementById('link-facebook').href = aboutData.fbUrl || "#";
            document.getElementById('link-phone').innerText = aboutData.phoneNum ? `📞 هاتف: ${aboutData.phoneNum}` : "📞 هاتف التواصل";
            document.getElementById('link-phone').href = aboutData.phoneNum ? `tel:${aboutData.phoneNum}` : "#";

            document.getElementById('input-about-title').value = aboutData.title || "";
            document.getElementById('input-about-text').value = aboutData.text || "";
            document.getElementById('input-url-web').value = aboutData.webUrl || "";
            document.getElementById('input-url-fb').value = aboutData.fbUrl || "";
            document.getElementById('input-url-phone').value = aboutData.phoneNum || "";

            const container = document.getElementById('rings-container');
            const selectTeacher = document.getElementById('select-teacher');
            container.innerHTML = '';
            selectTeacher.innerHTML = '';

            let totalStudents = 0;
            let totalRings = 0;

            for (let ringKey in schoolData) {
                totalRings++;
                let ringInfo = schoolData[ringKey];
                totalStudents += ringInfo.students ? ringInfo.students.length : 0;

                if (!ringInfo.visibility) ringInfo.visibility = "show";

                let option = document.createElement('option');
                option.value = ringKey;
                option.innerText = `${ringInfo.teacherName} (${ringInfo.groupName})`;
                selectTeacher.appendChild(option);

                let ringCard = document.createElement('div');
                ringCard.className = 'ring-card';
                
                let timeBadgesHTML = '';
                if(ringInfo.times && ringInfo.times.length > 0) {
                    ringInfo.times.forEach(t => {
                        timeBadgesHTML += `<span class="time-badge">⏱️ ${t}</span>`;
                    });
                } else {
                    timeBadgesHTML = `<span class="time-badge">⏱️ غير محدد</span>`;
                }

                let currentId = totalRings;
                ringCard.innerHTML = `
                    <div class="ring-header" onclick="toggleRingList(${currentId})">
                        <div style="flex: 1; padding-left: 10px;">
                            <h2>حلقة ${ringInfo.teacherName} ${ringInfo.visibility === 'hide' ? '<span style="font-size:0.75rem; color:#ff9999; font-weight:normal;">(مخفية)</span>' : ''}</h2>
                            <div class="ring-meta-info">
                                <span class="badge-info">📦 الفوج: ${ringInfo.groupName}</span>
                                <span class="badge-info" style="background: rgba(44, 46, 19, 0.2)">👶 الفئة: ${ringInfo.ageGroup || "غير محدد"}</span>
                            </div>
                            <div class="time-container">${timeBadgesHTML}</div>
                        </div>
                        <div class="header-left-side">
                            <span class="count-badge">${ringInfo.students ? ringInfo.students.length : 0} ط</span>
                            <span class="arrow-icon" id="arrow-${currentId}">▼</span>
                        </div>
                    </div>
                    
                    <div class="ring-actions" id="actions-${currentId}" style="display: ${isAdmin ? 'flex' : 'none'}">
                        <button class="btn-sm btn-warning" onclick="editTeacherName('${ringKey}')">✏️ اسم الأستاذ</button>
                        <button class="btn-sm btn-warning" style="background-color: #2e6930;" onclick="editGroupNameAndAge('${ringKey}')">📝 الفوج/العمر</button>
                        <button class="btn-sm btn-warning" style="background-color:#977232;" onclick="editTeacherTime('${ringKey}')">⏱️ المواقيت</button>
                        <button class="btn-sm btn-info" onclick="bulkEditStudentsQuran('${ringKey}')">📝 حفظ جماعي</button>
                        
                        <div style="display:flex; align-items:center; gap:5px; background:#fff; padding:2px 5px; border-radius:4px; border:1px solid #cbc0b0;">
                            <span style="font-size:0.8rem; font-weight:bold;">👁️:</span>
                            <select style="padding:2px; font-size:0.75rem; width: auto;" onchange="toggleStudentsVisibility('${ringKey}', this.value)">
                                <option value="show" ${ringInfo.visibility === 'show' ? 'selected' : ''}>عرض</option>
                                <option value="hide" ${ringInfo.visibility === 'hide' ? 'selected' : ''}>إخفاء</option>
                            </select>
                        </div>

                        <button class="btn-sm btn-danger" onclick="deleteTeacher('${ringKey}')">❌ حذف</button>
                    </div>

                    <div class="student-list-container" id="list-container-${currentId}">
                        <ul class="student-list" id="list-${currentId}"></ul>
                    </div>
                `;
                
                container.appendChild(ringCard);

                let ul = document.getElementById(`list-${currentId}`);
                if(ringInfo.visibility === "hide" || !ringInfo.students || ringInfo.students.length === 0) {
                    ul.innerHTML = `<li class="student-item" style="color:#aaa; font-weight:400; font-size:0.9rem;">لا يوجد طلاب حالياً في هذا الفوج أو القائمة مخفية.</li>`;
                } else {
                    ringInfo.students.forEach((student, index) => {
                        let li = document.createElement('li');
                        li.className = 'student-item';
                        let quranDisplay = student.quran ? student.quran : "غير محدد";

                        li.innerHTML = `
                            <div class="student-info">
                                <span class="student-name">${index + 1}. ${student.name}</span>
                                <span class="student-quran">📖 مقدار الحفظ: ${quranDisplay}</span>
                            </div>
                            <div class="student-ctrls">
                                <button class="btn-sm btn-warning" style="display: ${isAdmin ? 'block' : 'none'}; background-color: #705828;" onclick="event.stopPropagation(); editStudentQuran('${ringKey}', ${index})">✏️ تعديل الحفظ</button>
                                <button class="btn-sm btn-danger" style="display: ${isAdmin ? 'block' : 'none'}" onclick="event.stopPropagation(); deleteStudent('${ringKey}', ${index})">حذف</button>
                            </div>
                        `;
                        ul.appendChild(li);
                    });
                }
            }

            document.getElementById('teachers-count').innerText = totalRings;
            document.getElementById('students-count').innerText = totalStudents;
            
            // تم إلغاء أسطر الـ LocalStorage هنا لتتحكم بالبيانات سحابياً بشكل كامل ومنع الحلقات التكرارية
        }

        // 5. دوال لوحة التحكم والتعديل (تقوم بالحفظ السحابي فوراً في Firebase)
        function updateAboutSection() {
            const titleInput = document.getElementById('input-about-title').value.trim();
            const textInput = document.getElementById('input-about-text').value.trim();
            const webInput = document.getElementById('input-url-web').value.trim();
            const fbInput = document.getElementById('input-url-fb').value.trim();
            const phoneInput = document.getElementById('input-url-phone').value.trim();

            if (titleInput !== "" && textInput !== "") {
                aboutData.title = titleInput;
                aboutData.text = textInput;
                aboutData.webUrl = webInput;
                aboutData.fbUrl = fbInput;
                aboutData.phoneNum = phoneInput;
                
                db.ref('aboutData').set(aboutData);
                alert("تم تحديث بيانات الواجهة سحابياً بنجاح!");
            } else {
                alert("يرجى ملء الحقول الأساسية أولاً!");
            }
        }

        function toggleStudentsVisibility(ringKey, value) {
            schoolData[ringKey].visibility = value;
            db.ref('schoolData').set(schoolData);
        }

        function toggleRingList(id) {
            const listContainer = document.getElementById(`list-container-${id}`);
            const arrow = document.getElementById(`arrow-${id}`);
            if (listContainer.classList.contains('open')) {
                listContainer.classList.remove('open');
                arrow.style.transform = 'rotate(0deg)';
            } else {
                listContainer.classList.add('open');
                arrow.style.transform = 'rotate(180deg)';
            }
        }

        const headerEl = document.getElementById('main-header');
        let lastTap = 0;

        headerEl.addEventListener('click', function (e) {
            const currentTime = new Date().getTime();
            const tapLength = currentTime - lastTap;
            if (tapLength < 300 && tapLength > 0) {
                e.preventDefault();
                triggerSecretAdmin();
            }
            lastTap = currentTime;
        });

        function triggerSecretAdmin() {
            if(!isAdmin) {
                let password = prompt("أدخل كود التعديل السري للدخول للوحة الإدارة:");
                if(password === adminPassword) {
                    isAdmin = true;
                    document.getElementById('main-admin-panel').style.display = 'block';
                    renderSchool();
                    window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
                } else if (password !== null) {
                    alert("الكود خاطئ!");
                }
            }
        }

        function exitAdminMode() {
            isAdmin = false;
            document.getElementById('main-admin-panel').style.display = 'none';
            renderSchool();
            window.scrollTo({ top: 0, behavior: 'smooth' });
            alert("تم الخروج وقفل لوحة التحكم بنجاح.");
        }

        function changeAdminPassword() {
            const input = document.getElementById('new-password-input');
            let newPass = input.value.trim();
            if(newPass !== "") {
                adminPassword = newPass;
                db.ref('adminPassword').set(adminPassword);
                alert(`تم تحديث الكود السحابي بنجاح! الجديد هو: ${newPass}`);
                input.value = "";
            }
        }

        function resetToDefaultData() {
            if(confirm("هل تريد إعادة ضبط الموقع سحابياً بالكامل للملف الافتراضي؟")) {
                schoolData = JSON.parse(JSON.stringify(defaultData));
                aboutData = JSON.parse(JSON.stringify(defaultAbout));
                db.ref('schoolData').set(schoolData);
                db.ref('aboutData').set(aboutData);
                alert("تمت إعادة تهيئة السيرفر بنجاح!");
            }
        }

        function addTeacher() {
            const inputName = document.getElementById('new-teacher');
            const inputGroup = document.getElementById('new-group');
            const inputAge = document.getElementById('new-age');
            const inputTime = document.getElementById('new-time');

            let name = inputName.value.trim();
            let group = inputGroup.value.trim() || "الفوج العام";
            let age = inputAge.value.trim() || "غير محدد";
            let timeVal = inputTime.value.trim();

            if(name !== "") {
                let uniqueKey = `${name} - ${group}`;
                if(schoolData[uniqueKey]) {
                    alert("هذا الفوج لهذا الأستاذ مسجل بالفعل!");
                } else {
                    let timesArray = timeVal ? timeVal.split(',').map(t => t.trim()) : [];
                    schoolData[uniqueKey] = {
                        teacherName: name,
                        groupName: group,
                        ageGroup: age,
                        visibility: "show",
                        times: timesArray.length > 0 ? timesArray : ["غير محدد"],
                        students: []
                    };
                    inputName.value = "";
                    inputGroup.value = "";
                    inputAge.value = "";
                    inputTime.value = "";
                    db.ref('schoolData').set(schoolData);
                }
            } else {
                alert("يرجى كتابة اسم الأستاذ أولاً!");
            }
        }

        function editTeacherName(oldKey) {
            event.stopPropagation();
            let currentName = schoolData[oldKey].teacherName;
            let newName = prompt(`تعديل اسم الأستاذ:`, currentName);
            if(newName && newName.trim() !== "" && newName.trim() !== currentName) {
                newName = newName.trim();
                schoolData[oldKey].teacherName = newName;
                
                let newKey = `${newName} - ${schoolData[oldKey].groupName}`;
                schoolData[newKey] = schoolData[oldKey];
                delete schoolData[oldKey];
                
                db.ref('schoolData').set(schoolData);
            }
        }

        function editGroupNameAndAge(oldKey) {
            event.stopPropagation();
            let currentGroup = schoolData[oldKey].groupName;
            let currentAge = schoolData[oldKey].ageGroup || "غير محدد";
            
            let newGroup = prompt(`تعديل اسم الفوج:`, currentGroup);
            if (newGroup === null) return;
            newGroup = newGroup.trim() || "الفوج العام";

            let newAge = prompt(`تعديل الفئة العمرية لهذا الفوج:`, currentAge);
            if (newAge === null) return;
            newAge = newAge.trim() || "غير محدد";

            schoolData[oldKey].groupName = newGroup;
            schoolData[oldKey].ageGroup = newAge;

            let newKey = `${schoolData[oldKey].teacherName} - ${newGroup}`;
            if (newKey !== oldKey) {
                schoolData[newKey] = schoolData[oldKey];
                delete schoolData[oldKey];
            }
            db.ref('schoolData').set(schoolData);
            alert("تم تحديث بيانات الفوج سحابياً!");
        }

        function editTeacherTime(ringKey) {
            event.stopPropagation();
            let currentTimes = schoolData[ringKey].times.join(', ');
            let newTimeVal = prompt(`تعديل المواقيت (افصل بفاصلة , ):`, currentTimes);
            if(newTimeVal !== null) {
                schoolData[ringKey].times = newTimeVal.trim() ? newTimeVal.split(',').map(t => t.trim()) : ["غير محدد"];
                db.ref('schoolData').set(schoolData);
            }
        }

        function bulkEditStudentsQuran(ringKey) {
            event.stopPropagation();
            if (!schoolData[ringKey].students || schoolData[ringKey].students.length === 0) {
                alert("لا يوجد طلاب في هذا الفوج لتعديل حفظهم جماعياً!");
                return;
            }
            let bulkQuran = prompt(`أدخل مقدار الحفظ الموحد لطلاب حلقة (${schoolData[ringKey].teacherName} - ${schoolData[ringKey].groupName}):`);
            if (bulkQuran !== null) {
                let finalQuran = bulkQuran.trim() || "غير محدد";
                schoolData[ringKey].students.forEach(student => {
                    student.quran = finalQuran;
                });
                db.ref('schoolData').set(schoolData);
                alert("تم تحديث حفظ طلاب الفوج سحابياً!");
            }
        }

        function addStudent() {
            const inputName = document.getElementById('new-student');
            const inputQuran = document.getElementById('new-student-quran');
            const teacherSelect = document.getElementById('select-teacher');
            
            let studentName = inputName.value.trim();
            let studentQuran = inputQuran.value.trim() || "غير محدد";
            let selectedRingKey = teacherSelect.value;

            if(studentName !== "" && selectedRingKey) {
                if(!schoolData[selectedRingKey].students) {
                    schoolData[selectedRingKey].students = [];
                }
                schoolData[selectedRingKey].students.push({
                    name: studentName,
                    quran: studentQuran
                });
                inputName.value = "";
                inputQuran.value = "";
                db.ref('schoolData').set(schoolData);
            }
        }

        function editStudentQuran(ringKey, index) {
            let currentQuran = schoolData[ringKey].students[index].quran || "غير محدد";
            let studentName = schoolData[ringKey].students[index].name;
            let newQuran = prompt(`تعديل مقدار حفظ التلميذ (${studentName}):`, currentQuran);
            if (newQuran !== null) {
                schoolData[ringKey].students[index].quran = newQuran.trim() || "غير محدد";
                db.ref('schoolData').set(schoolData);
            }
        }

        function deleteStudent(ringKey, index) {
            if(confirm("هل تريد حذف هذا التلميذ؟")) {
                schoolData[ringKey].students.splice(index, 1);
                db.ref('schoolData').set(schoolData);
            }
        }

        function deleteTeacher(ringKey) {
            event.stopPropagation();
            if(confirm(`هل تريد حذف حلقة الأستاذ (${schoolData[ringKey].teacherName}) - فوج (${schoolData[ringKey].groupName}) نهائياً؟`)) {
                delete schoolData[ringKey];
                db.ref('schoolData').set(schoolData);
            }
        }

        // تشغيل فحص البنية فور التحميل الأول للموقع
        window.onload = function() {
            upgradeDataStructure();
        };
    </script>
</body>
</html>
